name: Build and Push Agent Images

on:
  push:
    branches: [main]
    paths:
      - 'v2_services/**'
      - 'nova_host_bridge/**'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:

jobs:
  detect-changed:
    runs-on: ubuntu-latest
    outputs:
      agents: ${{ steps.changes.outputs.agents }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep "v2_services/" | cut -d/ -f2 | sort -u | jq -R . | jq -sc .)
          if [ "$CHANGED" = "null" ] || [ "$CHANGED" = "[]" ]; then
            CHANGED="[]"
          fi
          echo "agents=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed agents: $CHANGED"

  build:
    needs: detect-changed
    if: needs.detect-changed.outputs.agents != '[]' && needs.detect-changed.outputs.agents != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        agent: ${{ fromJson(needs.detect-changed.outputs.agents) }}
      max-parallel: 3

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f "./v2_services/${{ matrix.agent }}/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No Dockerfile for ${{ matrix.agent }}, skipping"
          fi

      - name: Login to GHCR
        if: steps.check.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./v2_services/${{ matrix.agent }}
          push: true
          tags: |
            ghcr.io/redeye1973/nova-${{ matrix.agent }}:latest
            ghcr.io/redeye1973/nova-${{ matrix.agent }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
