name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Add Hetzner to known hosts
        run: ssh-keyscan -H 178.104.207.194 >> ~/.ssh/known_hosts

      - name: Sync agent code
        run: |
          rsync -avz --delete \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='*.pyc' \
            v2_services/ \
            root@178.104.207.194:/docker/nova-v2/services/

      - name: Sync infrastructure
        run: |
          rsync -avz \
            --exclude='.env' \
            --exclude='*.pyc' \
            infrastructure/docker-compose.yml \
            root@178.104.207.194:/docker/nova-v2/

      - name: Build changed images
        run: |
          ssh root@178.104.207.194 "cd /docker/nova-v2 && docker compose build --parallel 2>&1 | tail -20"

      - name: Rolling deploy
        run: |
          ssh root@178.104.207.194 "cd /docker/nova-v2 && docker compose up -d --remove-orphans 2>&1 | tail -10"

      - name: Wait for health
        run: sleep 30

      - name: Health check
        run: |
          FAILED=0
          for agent in nova-v2-judge nova-v2-agent-11-monitor nova-v2-agent-16-cost-guard nova-v2-agent-44-secrets-vault; do
            status=$(ssh root@178.104.207.194 "docker inspect $agent --format '{{.State.Health.Status}}'" 2>/dev/null || echo "missing")
            echo "$agent: $status"
            if [ "$status" != "healthy" ]; then
              FAILED=$((FAILED + 1))
            fi
          done
          if [ $FAILED -gt 0 ]; then
            echo "::warning::$FAILED containers not healthy after deploy"
          fi
