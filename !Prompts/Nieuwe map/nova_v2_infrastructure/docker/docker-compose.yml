services:
  # PostgreSQL voor N8n v2 backend
  postgres-v2:
    image: postgres:16-alpine
    container_name: nova-v2-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_NON_ROOT_USER=${POSTGRES_NON_ROOT_USER}
      - POSTGRES_NON_ROOT_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sh:/docker-entrypoint-initdb.d/init-data.sh:ro
    networks:
      - nova-v2-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10
    # Geen externe port exposure, alleen intern
    expose:
      - "5432"

  # Redis voor N8n queue mode + caching
  redis-v2:
    image: redis:7-alpine
    container_name: nova-v2-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - nova-v2-network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    expose:
      - "6379"

  # N8n main instance (receives webhooks, runs workflows)
  n8n-v2-main:
    image: n8nio/n8n:latest
    container_name: nova-v2-n8n-main
    restart: unless-stopped
    ports:
      - "5679:5678"  # Extern 5679, intern 5678
    environment:
      # Executions mode
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis-v2
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
      
      # Database
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres-v2
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_NON_ROOT_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
      
      # Host config
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - WEBHOOK_URL=${WEBHOOK_URL}
      
      # Security
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_JWT_SECRET}
      
      # Timezone
      - GENERIC_TIMEZONE=Europe/Amsterdam
      - TZ=Europe/Amsterdam
      
      # Performance
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=336  # 14 dagen retention
      - EXECUTIONS_DATA_PRUNE_MAX_COUNT=10000
      
      # Metrics (voor Grafana later)
      - N8N_METRICS=true
      - N8N_METRICS_PREFIX=n8n_v2_
      
      # Logging
      - N8N_LOG_LEVEL=info
      - N8N_LOG_OUTPUT=console,file
      - N8N_LOG_FILE_LOCATION=/home/node/.n8n/logs/
    volumes:
      - n8n-data:/home/node/.n8n
      - ./config/n8n-custom:/home/node/.n8n/custom
    networks:
      - nova-v2-network
    depends_on:
      postgres-v2:
        condition: service_healthy
      redis-v2:
        condition: service_healthy

  # N8n worker #1 (processes queue jobs)
  n8n-v2-worker-1:
    image: n8nio/n8n:latest
    container_name: nova-v2-n8n-worker-1
    restart: unless-stopped
    command: worker --concurrency=5
    environment:
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis-v2
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
      
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres-v2
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_NON_ROOT_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
      
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      
      - GENERIC_TIMEZONE=Europe/Amsterdam
      - TZ=Europe/Amsterdam
      
      - N8N_LOG_LEVEL=info
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - nova-v2-network
    depends_on:
      n8n-v2-main:
        condition: service_started

  # Webhook processor (dedicated voor webhooks, betere performance)
  n8n-v2-webhook:
    image: n8nio/n8n:latest
    container_name: nova-v2-n8n-webhook
    restart: unless-stopped
    command: webhook
    ports:
      - "5680:5678"  # Aparte port voor webhooks
    environment:
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis-v2
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
      
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres-v2
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_NON_ROOT_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
      
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - WEBHOOK_URL=${WEBHOOK_URL}
      
      - GENERIC_TIMEZONE=Europe/Amsterdam
      - TZ=Europe/Amsterdam
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - nova-v2-network
    depends_on:
      n8n-v2-main:
        condition: service_started

  # MinIO voor NOVA v2 asset storage (S3-compatible)
  minio-v2:
    image: minio/minio:latest
    container_name: nova-v2-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web console
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks:
      - nova-v2-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Qdrant voor vector search (Surilians bible, asset similarity)
  qdrant-v2:
    image: qdrant/qdrant:latest
    container_name: nova-v2-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - nova-v2-network
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334

volumes:
  postgres-data:
    name: nova-v2-postgres-data
  redis-data:
    name: nova-v2-redis-data
  n8n-data:
    name: nova-v2-n8n-data
  minio-data:
    name: nova-v2-minio-data
  qdrant-data:
    name: nova-v2-qdrant-data

networks:
  nova-v2-network:
    name: nova-v2-network
    driver: bridge
