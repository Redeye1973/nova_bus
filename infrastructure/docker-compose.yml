services:
  # PostgreSQL voor N8n v2 backend
  postgres-v2:
    image: postgres:16-alpine
    container_name: nova-v2-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_NON_ROOT_USER=${POSTGRES_NON_ROOT_USER}
      - POSTGRES_NON_ROOT_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sh:/docker-entrypoint-initdb.d/init-data.sh:ro
    networks:
      - nova-v2-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10
    expose:
      - "5432"

  redis-v2:
    image: redis:7-alpine
    container_name: nova-v2-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - nova-v2-network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    expose:
      - "6379"

  n8n-v2-main:
    image: n8nio/n8n:latest
    container_name: nova-v2-n8n-main
    restart: unless-stopped
    ports:
      - "5679:5678"
    environment:
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis-v2
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres-v2
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_NON_ROOT_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - N8N_SECURE_COOKIE=false
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_JWT_SECRET}
      - GENERIC_TIMEZONE=Europe/Amsterdam
      - TZ=Europe/Amsterdam
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=336
      - EXECUTIONS_DATA_PRUNE_MAX_COUNT=10000
      - N8N_METRICS=true
      - N8N_METRICS_PREFIX=n8n_v2_
      - N8N_LOG_LEVEL=info
      - N8N_LOG_OUTPUT=console,file
      - N8N_LOG_FILE_LOCATION=/home/node/.n8n/logs/
    volumes:
      - n8n-data:/home/node/.n8n
      - ./config/n8n-custom:/home/node/.n8n/custom
    networks:
      - nova-v2-network
    depends_on:
      postgres-v2:
        condition: service_healthy
      redis-v2:
        condition: service_healthy

  n8n-v2-worker-1:
    image: n8nio/n8n:latest
    container_name: nova-v2-n8n-worker-1
    restart: unless-stopped
    command: worker --concurrency=5
    environment:
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis-v2
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres-v2
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_NON_ROOT_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - GENERIC_TIMEZONE=Europe/Amsterdam
      - TZ=Europe/Amsterdam
      - N8N_SECURE_COOKIE=false
      - N8N_LOG_LEVEL=info
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - nova-v2-network
    depends_on:
      n8n-v2-main:
        condition: service_started

  n8n-v2-webhook:
    image: n8nio/n8n:latest
    container_name: nova-v2-n8n-webhook
    restart: unless-stopped
    command: webhook
    ports:
      - "5680:5678"
    environment:
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis-v2
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres-v2
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_NON_ROOT_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - GENERIC_TIMEZONE=Europe/Amsterdam
      - TZ=Europe/Amsterdam
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - nova-v2-network
    depends_on:
      n8n-v2-main:
        condition: service_started

  # Agent 01 — Sprite Jury (FastAPI POC; internal only)
  sprite-jury-v2:
    build:
      context: ./services/sprite_jury
    image: nova-v2-sprite-jury:poc
    container_name: nova-v2-sprite-jury
    restart: unless-stopped
    expose:
      - "8101"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    networks:
      - nova-v2-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8101/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Agent 20 — Design Fase (palette / silhouette POC; internal only)
  agent-20-design-fase:
    build:
      context: ./services/agent_20_design_fase
    image: nova-v2-agent-20-design-fase:poc
    container_name: nova-v2-agent-20
    restart: unless-stopped
    expose:
      - "8120"
    networks:
      - nova-v2-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8120/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Agent 02 — Code Jury (Python/GDScript review POC; internal only)
  agent-02-code-jury:
    build:
      context: ./services/agent_02_code_jury
    image: nova-v2-agent-02-code-jury:poc
    container_name: nova-v2-agent-02
    restart: unless-stopped
    expose:
      - "8102"
    networks:
      - nova-v2-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8102/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio-v2:
    image: minio/minio:latest
    container_name: nova-v2-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    # Host 9000/9001 zijn op deze server bezet; v2 publiceert op 19000/19001
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks:
      - nova-v2-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  qdrant-v2:
    image: qdrant/qdrant:latest
    container_name: nova-v2-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - nova-v2-network
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334

volumes:
  postgres-data:
    name: nova-v2-postgres-data
  redis-data:
    name: nova-v2-redis-data
  n8n-data:
    name: nova-v2-n8n-data
  minio-data:
    name: nova-v2-minio-data
  qdrant-data:
    name: nova-v2-qdrant-data

networks:
  nova-v2-network:
    name: nova-v2-network
    driver: bridge
